<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.1);
}
.download-box{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}
.download-box input{
padding:8px;
border-radius:8px;
border:none;
}
.download-box button{background:#00c9a7;}
#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
padding:10px;
}
.day{
padding:12px;
text-align:center;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}
.day:hover{
transform:scale(1.15);
box-shadow:0 0 15px #00ffcc;
}
.day:active{transform:scale(0.95);}
.fab{
position:fixed;
bottom:30px;
right:30px;
width:70px;
height:70px;
border-radius:50%;
background:#0072ff;
font-size:35px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}
.modal-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:25px;
border-radius:18px;
width:95%;
max-width:500px;
}
.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.form-grid input,
.form-grid select{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
}
.form-grid input[type="number"],
.form-grid input[type="date"],
.form-grid #indusid,
.form-grid input[type="file"]{
grid-column:span 2;
}
button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}
.submit{background:#00c9a7;}
.close{background:red;}
.submit:disabled{opacity:0.6;}
.button-group{
display:flex;
gap:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="navbar">
<h2>💼 Reports System</h2>
</div>

<div class="download-box">
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="downloadData()">⬇ Download</button>
</div>

<div style="text-align:center;">
<button onclick="prevMonth()">⬅</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">➡</button>
</div>

<div id="calendar"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">
<div class="modal-box">

<div id="formSection">

<h3>💸 Working Entry</h3>

<div class="form-grid">
<input type="date" id="date">
<input id="name" placeholder="Engineer Name">

<select id="type">
<option value="">Select Type</option>
<option>New Installation</option>
<option>Rectification</option>
</select>

<input id="indusid" placeholder="Indus ID">
<input type="number" id="count" placeholder="wire Count">

<input type="file" id="video" accept="video/*">
</div>

<div class="button-group">
<button class="submit" onclick="submitWorking()">Submit</button>
<button class="close" onclick="closeModal()">Close</button>
</div>

</div>

<div id="viewSection" style="display:none;"></div>

</div>
</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwG4Nk1c_PtjTF1mSqmOBBfmip0EUHrSny16OJQO6A9fuNJcMKh-03R8BPXfZn25QY/exec";

let currentDate=new Date();
let allData=[];
let isSubmitting=false;

// USER
let currentUser=localStorage.getItem("user") || prompt("Enter Name");
localStorage.setItem("user",currentUser);

// ✅ FIXED MODAL OPEN
function openModal(){

document.getElementById("modal").style.display="flex";

// show form
document.getElementById("formSection").style.display="block";

// hide view
document.getElementById("viewSection").style.display="none";
document.getElementById("viewSection").innerHTML="";

// auto fill
document.getElementById("name").value=currentUser;
document.getElementById("date").value = fixDate(new Date());
}

// ✅ FIXED CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";

// reset UI
document.getElementById("formSection").style.display="block";
document.getElementById("viewSection").style.display="none";
}

// DATE FIX
function fixDate(d){
if(!d) return "";
let date=new Date(d);
date.setMinutes(date.getMinutes()-date.getTimezoneOffset());
return date.toISOString().split("T")[0];
}

// CALENDAR
function renderCalendar(){
let year=currentDate.getFullYear();
let month=currentDate.getMonth();

document.getElementById("monthLabel").innerText=
currentDate.toLocaleString('default',{month:'long',year:'numeric'});

let firstDay=new Date(year,month,1).getDay();
let days=new Date(year,month+1,0).getDate();

let html="";

for(let i=0;i<firstDay;i++) html+="<div></div>";

for(let d=1;d<=days;d++){

let date=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
let found=allData.filter(x=>fixDate(x.date)===date);

html+=`
<div class="day" onclick="showDay('${date}')"
style="background:${found.length?'#22c55e':'#ef4444'}">
${d}
</div>`;
}

document.getElementById("calendar").innerHTML=html;
}

// BASE64
function toBase64(file){
return new Promise((resolve)=>{
let reader=new FileReader();
reader.readAsDataURL(file);
reader.onload=()=>resolve(reader.result);
});
}

// ✅ VIEW DATA FIXED
function showDay(date){

let list=allData.filter(x=>fixDate(x.date)===date);

if(list.length==0){
alert("No data");
return;
}

document.getElementById("formSection").style.display="none";
document.getElementById("viewSection").style.display="block";

let html=`<h3>${date}</h3>`;
let total=0;

list.forEach(x=>{
total+=Number(x.count);

html+=`
<div style="background:#222;padding:10px;margin:5px;border-radius:8px;">
👤 ${x.name}<br>
🏷 ${x.indusid}<br>
📊 ${x.workType}<br>
🔢 ${x.count}<br>
🎥 ${x.videoUrl ? `<a href="${x.videoUrl}" target="_blank">View Video</a>` : 'No Video'}
</div>`;
});

html+=`<h3>Total: ${total}</h3>
<button class="close" onclick="closeModal()">Close</button>`;

document.getElementById("viewSection").innerHTML=html;
document.getElementById("modal").style.display="flex";
}

// SUBMIT
async function submitWorking(){

if(isSubmitting) return;

let btn=document.querySelector(".submit");
isSubmitting=true;
btn.innerText="Uploading...";
btn.disabled=true;

try{

let file=document.getElementById("video").files[0];

let base64="", mimeType="";

if(file){
if(file.size>10*1024*1024){
alert("Max 10MB");
return;
}
base64=await toBase64(file);
mimeType=file.type;
}

let data={
name:currentUser,
count:document.getElementById("count").value,
workType:document.getElementById("type").value,
indusid:document.getElementById("indusid").value,
date:document.getElementById("date").value,
video:base64,
mimeType:mimeType
};

await fetch(WEB_APP_URL,{
method:"POST",
body:JSON.stringify(data)
});

alert("Saved ✅");
closeModal();
loadData();

}catch(e){
console.log(e);
alert("Error ❌");
}

isSubmitting=false;
btn.innerText="Submit";
btn.disabled=false;
}

// LOAD
async function loadData(){
let res=await fetch(WEB_APP_URL+"?type=get");
allData=await res.json();
renderCalendar();
}

function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();}

loadData();

</script>

</body>
</html>
