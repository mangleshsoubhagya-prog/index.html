<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
.navbar{display:flex;justify-content:space-between;padding:15px;background:rgba(255,255,255,0.08);}
button{background:#ddf59d;color:#0509f3;border:none;padding:8px 15px;border-radius:25px;cursor:pointer;}
.glass{background: rgba(255,255,255,0.08);backdrop-filter: blur(20px);border-radius:20px;padding:15px;margin:10px;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.day{padding:12px;text-align:center;border-radius:12px;cursor:pointer;}
.today{border:3px solid yellow;}
.p{background:#08e613;}
.a{background:#ff4b2b;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-box{background:#111;padding:20px;border-radius:15px;width:90%;max-width:500px;}
input{width:100%;padding:10px;margin:5px;border-radius:10px;border:none;}
#map{height:300px;}

button{
background:#ddf59d;
color:#0509f3;
border:none;
padding:8px 15px;
border-radius:25px;
cursor:pointer;
transition:all 0.3s ease;
}

/* 🔥 BUTTON HOVER */
button:hover{
background:#ff4b2b;
color:#fff;
transform:scale(1.1);
box-shadow:0 5px 15px rgba(255,75,43,0.5);
}

/* 🔥 CALENDAR DAY */
.day{
padding:12px;
text-align:center;
border-radius:12px;
cursor:pointer;
transition:all 0.25s ease;
background:rgba(255,255,255,0.08);
}

/* HOVER EFFECT */
.day:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 10px 20px rgba(0,255,204,0.4);
}

/* TODAY GLOW */
.today{
border:3px solid yellow;
box-shadow:0 0 15px yellow;
}

/* PRESENT / ABSENT COLORS */
.p{
background:#08e613;
color:#000;
}

.a{
background:#ff4b2b;
color:#fff;
}

/* 🔥 ENGINEER LIST HOVER */
#engineerList div{
padding:8px;
margin:5px;
border-radius:10px;
background:rgba(255,255,255,0.1);
cursor:pointer;
transition:all 0.3s ease;
}

#engineerList div:hover{
background:#00ffcc;
color:#000;
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,255,204,0.5);
}

</style>
</head>

<body>

<div class="navbar">
<h2>Bhavy Softech Solution</h2>
<div>
<span id="userName"></span>
<button onclick="logout()">Logout</button>
<button onclick="Dashboard()">Dashboard</button>

</div>
</div>

<div class="glass">
<button onclick="openAttendance()">📍 Mark Attendance</button>
<button onclick="openDownload()">📥 Download</button>
</div>

<div class="glass">
<h3>
<button onclick="prevMonth()">⬅</button>
<span id="monthLabel"></span>
<button onclick="nextMonth()">➡</button>
</h3>

<div id="calendarGrid" class="calendar-grid"></div>

<h3>👷 Engineers</h3>
<div id="engineerList">Click any date...</div>
</div>

<!-- Attendance -->
<div id="attendanceModal" class="modal">
<div class="modal-box">
<input id="manualPlace" placeholder="Enter Place">
<input id="autoLocation" readonly>
<button onclick="submitAttendance()">Submit</button>
<button onclick="closeAttendance()">Close</button>
</div>
</div>

<!-- Download -->
<div id="downloadModal" class="modal">
<div class="modal-box">
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="downloadCSV()">Download</button>
<button onclick="closeDownload()">Close</button>
</div>
</div>

<!-- MAP -->
<div id="mapModal" class="modal">
<div class="modal-box">
<h3 id="userTitle"></h3>

<div>
<button onclick="showAttendance()">📍 Attendance</button>
<button onclick="showLive()">🛰 Live</button>
</div>

<div id="userStats"></div>
<div id="map"></div>

<button onclick="playRoute()">▶ Play</button>
<button onclick="closeMap()">Close</button>
</div>
</div>

<script>

let selectedUserData = [];
let map, marker, polyline, routePoints = [];
let playInterval;

function Dashboard(){
  window.location="dashboard.html";
}

const API_URL="https://script.google.com/macros/s/AKfycbzJI9ql80XbnfGpk1fBl-BJ0FKnRZTM-2ZkqpSo4UnoeJ6YoNnjtR6B_Z_tCVRPnRr7FQ/exec";

let user=localStorage.getItem("user");
let role=(localStorage.getItem("role")||"user").toLowerCase();
let isAdmin=role==="admin";

if(!user) location.href="login.html";
userName.innerText=user;

let allData=[],currentDate=new Date();
let trackingStarted=false,lastLat=null,lastLon=null;

/* DATE */
function getLocalDate(date){
let d=new Date(date);
return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}

/* ATTENDANCE */
function openAttendance(){
attendanceModal.style.display="flex";
navigator.geolocation.getCurrentPosition(pos=>{
autoLocation.value=pos.coords.latitude+","+pos.coords.longitude;
});
}

function submitAttendance(){
let today=getLocalDate(new Date());

let already=allData.filter(d=>d.name===user && d.date===today && d.place!=="Live");

if(already.length>0){
alert("Already Marked");
localStorage.setItem("tracking","on");
startLiveTracking();
return;
}

navigator.geolocation.getCurrentPosition(pos=>{
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"attendance",
name:user,
place:manualPlace.value,
lat:pos.coords.latitude,
lon:pos.coords.longitude
})
}).then(()=>{
alert("Saved");
localStorage.setItem("tracking","on");
startLiveTracking();
closeAttendance();
loadData();
});
});
}

function closeAttendance(){attendanceModal.style.display="none";}

/* LIVE */
function startLiveTracking(){
if(trackingStarted) return;
if(localStorage.getItem("tracking")!=="on") return;

trackingStarted=true;

navigator.geolocation.watchPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

if(lastLat===null){
lastLat=lat; lastLon=lon;
sendLive(lat,lon);
return;
}

let d=getDistance(lastLat,lastLon,lat,lon);

if(d>0.02){
lastLat=lat; lastLon=lon;
sendLive(lat,lon);
}
});
}

function sendLive(lat,lon){
fetch(API_URL,{
method:"POST",
body:JSON.stringify({
type:"live",
name:user,
lat:lat,
lon:lon,
place:"Live"
})
});
}

/* LOAD */
function loadData(){
Promise.all([
fetch(API_URL+"?type=history").then(r=>r.json()),
fetch(API_URL+"?type=live").then(r=>r.json())
])
.then(([att,live])=>{

allData=[...att,...live];

let filtered=isAdmin?allData:allData.filter(d=>d.name===user);
renderCalendar(filtered);

let today=getLocalDate(new Date());

if(att.some(d=>d.name===user && d.date===today)){
localStorage.setItem("tracking","on");
startLiveTracking();
}

});
}

/* CALENDAR */
function renderCalendar(data){

calendarGrid.innerHTML="";

let base=new Date(currentDate);

let start = base.getDate()>=26
? new Date(base.getFullYear(),base.getMonth(),26)
: new Date(base.getFullYear(),base.getMonth()-1,26);

let end=new Date(start.getFullYear(),start.getMonth()+1,25);

monthLabel.innerText=start.toDateString()+" → "+end.toDateString();

let temp=new Date(start);

while(temp<=end){

let full=getLocalDate(temp);
let dayData=data.filter(d=>d.date===full);
let attendanceData=dayData.filter(d=>d.place!=="Live");

let div=document.createElement("div");

let todayStr=getLocalDate(new Date());

div.className="day "+(attendanceData.length?"p":"a")+(full===todayStr?" today":"");

div.innerHTML=`
${temp.getDate()}
<small>${temp.toLocaleDateString("en-IN",{weekday:'short'})}</small>
`;

div.onclick=()=>{

let userMap={};

dayData.forEach(d=>{
if(d.place!=="Live"){
userMap[d.name]=d;
}
});

let unique=Object.values(userMap);

engineerList.innerHTML=unique.length
? unique.map(d=>`
<div onclick="openUser('${d.name}')">
👷 ${d.name}<br>
📍 <small>${d.place || "No Place"}</small>
</div>
`).join("")
: "No Attendance";

};

calendarGrid.appendChild(div);
temp.setDate(temp.getDate()+1);
}
}

/* MAP */
function openUser(name){

mapModal.style.display="flex";
userTitle.innerText="👷 "+name;

selectedUserData=allData.filter(d=>d.name===name);

setTimeout(()=>{
if(!map){
map=L.map('map').setView([22,78],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}
showAttendance();
},300);

}

/* ATTENDANCE MAP */
function showAttendance(){

if(marker) map.removeLayer(marker);
if(polyline) map.removeLayer(polyline);

let attData=selectedUserData.filter(d=>d.place!=="Live");

if(attData.length){

let lat=parseFloat(attData[0].lat);
let lon=parseFloat(attData[0].lon);

marker=L.marker([lat,lon]).addTo(map);
map.setView([lat,lon],13);

userStats.innerHTML="📍 Attendance Location";

}else{
userStats.innerHTML="No Attendance Location";
}

}

/* LIVE MAP */
function showLive(){

if(marker) map.removeLayer(marker);
if(polyline) map.removeLayer(polyline);

routePoints=selectedUserData
.filter(d=>d.place==="Live")
.map(d=>[parseFloat(d.lat),parseFloat(d.lon)]);

if(routePoints.length){

polyline=L.polyline(routePoints,{color:'cyan'}).addTo(map);
marker=L.marker(routePoints[0]).addTo(map);
map.fitBounds(polyline.getBounds());

userStats.innerHTML=`📏 Distance: ${calculateDistance()} KM`;

}else{
userStats.innerHTML="No Live Data";
}

}

/* PLAYBACK */
function playRoute(){
let i=0;
clearInterval(playInterval);
playInterval=setInterval(()=>{
if(i>=routePoints.length){clearInterval(playInterval);return;}
marker.setLatLng(routePoints[i]);
map.panTo(routePoints[i]);
i++;
},600);
}

/* DISTANCE */
function calculateDistance(){
let total=0;
for(let i=1;i<routePoints.length;i++){
total+=getDistance(routePoints[i-1][0],routePoints[i-1][1],routePoints[i][0],routePoints[i][1]);
}
return total.toFixed(2);
}

function getDistance(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;
let a=Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;
let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

/* DOWNLOAD */
function openDownload(){downloadModal.style.display="flex";}
function closeDownload(){downloadModal.style.display="none";}
function downloadCSV(){
let from=fromDate.value;
let to=toDate.value;
let url=API_URL+"?type=csv&from="+from+"&to="+to;
if(!isAdmin){url+="&user="+user;}
window.open(url);
}

/* NAV */
function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1);loadData();}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1);loadData();}

/* LOGOUT */
function logout(){
localStorage.clear();
location.href="login.html";
}

function closeMap(){
mapModal.style.display="none";
clearInterval(playInterval);
}

loadData();

</script>
</body>
</html>
