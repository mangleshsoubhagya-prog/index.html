<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(255,255,255,0.08);
}

.center{text-align:center;margin:20px;}

.btn{
padding:10px 15px;
border:none;
border-radius:25px;
cursor:pointer;
margin:5px;
}

.logout-btn{
background:#ff4b2b;
color:white;
border:none;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

table{
width:100%;
background:white;
color:black;
border-collapse:collapse;
}
td,th{
padding:10px;
border:1px solid #ddd;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
}

#map{
height:300px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="navbar">
<h2>Dashboard</h2>

<div>
<span id="userName"></span>
<button class="logout-btn" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Logout
</button>
</div>

</div>

<div class="center">
<button class="btn" onclick="openAttendance()">📍 Mark Attendance</button>
<button class="btn" onclick="downloadCSV()">📊 CSV</button>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Place</th>
<th>Map</th>
<th id="trackHeader">Track</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<!-- ATTENDANCE -->
<div id="attendanceModal" class="modal">
<div class="modal-box">

<h3>📍 Mark Attendance</h3>

<input id="place" placeholder="Enter Place">

<br><br>
<button class="btn" onclick="getLocation()">📡 Get Location</button>
<button id="submitBtn" class="btn" onclick="submitAttendance()">Submit</button>

<br><br>
<button onclick="closeAttendance()">Close</button>

</div>
</div>

<!-- MAP -->
<div id="mapModal" class="modal">
<div class="modal-box">

<h3>📡 Tracking</h3>

<select id="userSelect" onchange="loadUserRoute()"></select>

<div id="map"></div>

<br>
<button onclick="closeMap()">Close</button>

</div>
</div>

<script>

/* ROLE */
let role = (localStorage.getItem("role") || "user").toLowerCase();
let isAdmin = (role === "admin");

/* USER */
let user = localStorage.getItem("user");

if(!user){
alert("Login required");
window.location.href="login.html";
}

document.getElementById("userName").innerText=user;

/* HIDE USER FEATURES */
if(!isAdmin){
document.getElementById("trackHeader").style.display="none";
}

/* API */
const API_URL="https://script.google.com/macros/s/AKfycbxIoXdbgjTD_gvhtnqWBDUI0ShrSy7Je5_ezCRk_xx535NmHgpRzfFpi76VbtBXvLz-NA/exec";

let lat="", lon="";
let map, marker, polyline;
let allData=[];

/* MODAL */
function openAttendance(){
document.getElementById("attendanceModal").style.display="flex";
}
function closeAttendance(){
document.getElementById("attendanceModal").style.display="none";
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
lat=pos.coords.latitude;
lon=pos.coords.longitude;
alert("Location captured");
});
}

/* SUBMIT */
function submitAttendance(){

let btn=document.getElementById("submitBtn");
btn.disabled=true;

let place=document.getElementById("place").value;

if(!place || !lat){
alert("Fill all");
btn.disabled=false;
return;
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
name:user,
place:place,
lat:lat,
lon:lon,
date:new Date().toISOString().split("T")[0]
})
})
.then(res=>res.text())
.then(res=>{

if(res==="already"){
alert("Already marked");
btn.disabled=false;
return;
}

alert("Saved");
closeAttendance();
loadData();

});
}

/* LOAD DATA */
function loadData(){

historyTable.innerHTML="<tr><td colspan='5'>Loading...</td></tr>";

let today = new Date().toISOString().split("T")[0];

let url = API_URL+"?type=history&date="+today;

if(!isAdmin){
url += "&user=" + encodeURIComponent(user);
}

fetch(url)
.then(res=>res.json())
.then(data=>{

allData=data;

/* FILTER */
let filteredData = isAdmin ? data : data.filter(d => d.name === user);

/* USER LIST */
let users=[...new Set(data.map(d=>d.name))];
document.getElementById("userSelect").innerHTML =
users.map(u=>`<option value="${u}">${u}</option>`).join("");

/* TABLE */
let rows = filteredData.map(d=>`
<tr>
<td>${d.date}</td>
<td>${d.name}</td>
<td>${d.place}</td>
<td>${d.lat?`<a href="https://maps.google.com?q=${d.lat},${d.lon}" target="_blank">📍</a>`:"-"}</td>
<td style="${isAdmin ? '' : 'display:none'}">
${isAdmin ? `<button onclick="openMap()">📡</button>` : ""}
</td>
</tr>
`).join("");

historyTable.innerHTML = rows;

});
}

/* MAP */
function openMap(){

if(!isAdmin){
alert("Access Denied");
return;
}

document.getElementById("mapModal").style.display="flex";

setTimeout(()=>{

if(!map){
map = L.map('map').setView([22.5,78.9],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

loadUserRoute();

},200);
}

/* ROUTE */
function loadUserRoute(){

let selected=document.getElementById("userSelect").value;

if(marker) map.removeLayer(marker);
if(polyline) map.removeLayer(polyline);

let points = allData
.filter(d=>d.name===selected && d.lat && d.lon)
.map(d=>[d.lat,d.lon]);

if(points.length){

polyline = L.polyline(points,{color:'cyan'}).addTo(map);
marker = L.marker(points[points.length-1]).addTo(map);

map.fitBounds(polyline.getBounds());
}
}

/* CLOSE MAP */
function closeMap(){
document.getElementById("mapModal").style.display="none";
}

/* CSV */
function downloadCSV(){
let url = API_URL+"?type=csv";

if(!isAdmin){
url += "&user=" + encodeURIComponent(user);
}

window.open(url);
}

/* LOGOUT */
function logout(){
if(confirm("Logout?")){
localStorage.clear();
window.location.href="login.html";
}
}

/* INIT */
loadData();

</script>

</body>
</html>
